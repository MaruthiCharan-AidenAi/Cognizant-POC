<div class="loading-page">

  <div class="lb lb1"></div>
  <div class="lb lb2"></div>
  <div class="lb lb3"></div>
  <div class="dot-grid"></div>

  @if (!isVerifying) {

    <!-- Simple spinner -->
    <div class="loading-card">
      <div class="icon-wrap">
        <svg viewBox="0 0 100 100" fill="none" width="32" height="32">
          <rect x="8"  y="28" width="12" height="68" rx="3" fill="white"/>
          <rect x="24" y="42" width="12" height="54" rx="3" fill="white"/>
          <rect x="40" y="55" width="12" height="41" rx="3" fill="white"/>
          <rect x="56" y="68" width="12" height="28" rx="3" fill="white"/>
          <polyline points="14,26 30,16 46,22" stroke="white" stroke-width="4"
            stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="14" cy="26" r="5" fill="white"/>
          <circle cx="30" cy="16" r="5" fill="white"/>
          <circle cx="46" cy="22" r="5" fill="white"/>
          <circle cx="75" cy="38" r="20" stroke="white" stroke-width="5" fill="none"/>
          <path d="M75 38 L75 19 A19 19 0 0 1 92 52 Z" fill="white"/>
          <line x1="89" y1="52" x2="96" y2="62" stroke="white" stroke-width="6" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="ring-spinner"></div>
      <p class="loading-label">Loading…</p>
    </div>

  } @else {

    <!-- Full post-login card -->
    <div class="loading-card">

      <!-- Icon -->
      <div class="icon-wrap large">
        <svg viewBox="0 0 100 100" fill="none" width="42" height="42">
          <rect x="8"  y="28" width="12" height="68" rx="3" fill="white"/>
          <rect x="24" y="42" width="12" height="54" rx="3" fill="white"/>
          <rect x="40" y="55" width="12" height="41" rx="3" fill="white"/>
          <rect x="56" y="68" width="12" height="28" rx="3" fill="white"/>
          <!-- <polyline points="14,26 30,16 46,22" stroke="white" stroke-width="4"
            stroke-linecap="round" stroke-linejoin="round"/> -->
          <circle cx="14" cy="26" r="5" fill="white"/>
          <circle cx="30" cy="16" r="5" fill="white"/>
          <circle cx="46" cy="22" r="5" fill="white"/>
          <circle cx="75" cy="38" r="20" stroke="white" stroke-width="5" fill="none"/>
          <path d="M75 38 L75 19 A19 19 0 0 1 92 52 Z" fill="white"/>
          <line x1="89" y1="52" x2="96" y2="62" stroke="white" stroke-width="6" stroke-linecap="round"/>
        </svg>
      </div>

      <!-- Brand -->
      <p class="brand-name">Nebula AI</p>

      <!-- Progress bar -->
      <div class="progress-wrap">
        <div class="progress-track">
          <div class="progress-fill" [style.width.%]="progress"></div>
        </div>
        <span class="progress-pct">{{ progress }}%</span>
      </div>

      <!-- Step -->
      <div class="step" [class.step-done]="stepDone">
        <div class="step-icon">
          @if (stepDone) {
            <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
              <path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8"
                stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          } @else {
            <div class="step-spinner"></div>
          }
        </div>
        <span class="step-label">Authenticating your account</span>
      </div>

    </div>
  }

</div>
