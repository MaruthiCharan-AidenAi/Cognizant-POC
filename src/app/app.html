@if (auth.isLoading()) {
  <app-loading [isVerifying]="false" />

} @else if (auth.isVerifyingLogin()) {
  <app-loading [isVerifying]="true" />

} @else if (!auth.isAuthenticated()) {
  <app-login />

} @else {

  <div class="app-shell">

    <!-- Animated mesh blobs (glassmorphism background) -->
    <div class="bg-mesh">
      <div class="mesh-blob blob-1"></div>
      <div class="mesh-blob blob-2"></div>
      <div class="mesh-blob blob-3"></div>
      <div class="mesh-blob blob-4"></div>
    </div>

    <!-- Sidebar -->
    <app-sidebar
      [isCollapsed]="sidebarCollapsed"
      (toggleSidebar)="sidebarCollapsed = !sidebarCollapsed">
    </app-sidebar>

    <!-- Main content -->
    <div class="main-area">
      <router-outlet />
    </div>

  </div>
}
