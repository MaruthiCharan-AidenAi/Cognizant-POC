<div class="sidebar" [class.collapsed]="isCollapsed">

  <!-- ══════════ COLLAPSE TOGGLE — floating on right border ══════════ -->
  <button class="collapse-toggle" (click)="toggle()"
          [title]="isCollapsed ? 'Expand' : 'Collapse'">
    <lucide-icon name="ChevronLeft" [size]="14" *ngIf="!isCollapsed"></lucide-icon>
    <lucide-icon name="ChevronRight" [size]="14" *ngIf="isCollapsed"></lucide-icon>
  </button>

  <!-- ══════════ HEADER ══════════ -->
  <div class="sidebar-header">
    <div class="logo" [class.logo-centered]="isCollapsed">
      <div class="logo-icon">
         <svg viewBox="0 0 100 100" fill="none" width="30" height="30">
          <rect x="8"  y="28" width="12" height="68" rx="3" fill="white"/>
          <rect x="24" y="42" width="12" height="54" rx="3" fill="white"/>
          <rect x="40" y="55" width="12" height="41" rx="3" fill="white"/>
          <rect x="56" y="68" width="12" height="28" rx="3" fill="white"/>
          <!-- <polyline points="14,26 30,16 46,22" stroke="white" stroke-width="4"
            stroke-linecap="round" stroke-linejoin="round"/> -->
          <circle cx="14" cy="26" r="5" fill="white"/>
          <circle cx="30" cy="16" r="5" fill="white"/>
          <circle cx="46" cy="22" r="5" fill="white"/>
          <circle cx="75" cy="38" r="20" stroke="white" stroke-width="5" fill="none"/>
          <path d="M75 38 L75 19 A19 19 0 0 1 92 52 Z" fill="white"/>
          <line x1="89" y1="52" x2="96" y2="62" stroke="white" stroke-width="6" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="logo-text" *ngIf="!isCollapsed">Nebula AI</span>
      
    </div>


      
  </div>

  <!-- ══════════ NAV ══════════ -->
  <nav class="sidebar-nav">

   

   

    <a routerLink="/chat" routerLinkActive="active" class="nav-item">
      <span class="nav-icon-wrap">
        <lucide-icon name="message-square" [size]="17"></lucide-icon>
      </span>
      <span class="nav-text" *ngIf="!isCollapsed">Chatbot</span>
      <span class="nav-tooltip" *ngIf="isCollapsed">Chatbot</span>
    </a>

  </nav>

  <!-- ══════════ FOOTER ══════════ -->
  <div class="sidebar-footer">

    <div class="user-block" *ngIf="auth.user() as user">
      <div class="avatar-wrap">
        <img *ngIf="user.picture" [src]="user.picture"
             [alt]="user.name || ''" class="avatar"
             referrerpolicy="no-referrer"/>
        <div *ngIf="!user.picture" class="avatar-fallback">
          {{ (user.name || user.email || 'U').slice(0,1).toUpperCase() }}
        </div>
      </div>
      <div class="user-info" *ngIf="!isCollapsed">
        <p class="user-name">{{ user.name }}</p>
        <p class="user-email">{{ user.email }}</p>
      </div>
      <span class="nav-tooltip" *ngIf="isCollapsed">{{ user.name }}</span>
    </div>

    <button class="logout-btn" (click)="logout()">
      <span class="nav-icon-wrap logout-icon">
        <lucide-icon name="log-out" [size]="16"></lucide-icon>
      </span>
      <span class="nav-text" *ngIf="!isCollapsed">Logout</span>
      <span class="nav-tooltip" *ngIf="isCollapsed">Logout</span>
    </button>

  </div>
</div>
