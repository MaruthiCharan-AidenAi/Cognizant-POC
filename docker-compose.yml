version: '3.8'
services:
  backend:
    build: ./backend
    ports: ["8080:8080"]
    env_file: ./backend/.env
    volumes: ["./backend:/app"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    ports: ["3000:8080"]
    environment:
      - VITE_API_URL=http://localhost:8080
      - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    depends_on:
      - backend
